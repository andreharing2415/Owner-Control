services:
  postgres:
    image: postgres:16-alpine
    container_name: obramaster-postgres
    environment:
      POSTGRES_DB: obramaster
      POSTGRES_USER: obramaster
      POSTGRES_PASSWORD: obramaster
    ports:
      - "5444:5432"
    volumes:
      - obramaster_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obramaster -d obramaster"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: obramaster-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: obramaster
      MINIO_ROOT_PASSWORD: obramaster
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - obramaster_minio:/data

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: obramaster-api
    environment:
      DATABASE_URL: postgresql://obramaster:obramaster@postgres:5432/obramaster
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_URL: http://localhost:9000
      S3_ACCESS_KEY: obramaster
      S3_SECRET_KEY: obramaster
      S3_BUCKET: evidencias
      S3_REGION: us-east-1
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

volumes:
  obramaster_pgdata:
  obramaster_minio:
