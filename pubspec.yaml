name: owner_control
description: "Plataforma premium para proprietários gerenciarem obras de construção."
publish_to: 'none'

version: 1.0.0+15

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  firebase_core: ^3.8.1
  firebase_crashlytics: ^4.3.2   # MISC-01: crash reporting em produção
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^18.0.1
  file_picker: ^8.0.0
  http_parser: ^4.0.2
  path_provider: ^2.1.3
  open_filex: ^4.4.0
  image_picker: ^1.1.2
  geolocator: ^13.0.2
  provider: ^6.1.2
  flutter_riverpod: ^2.6.1
  go_router: ^14.2.7
  flutter_svg: ^2.0.17
  cupertino_icons: ^1.0.8
  fl_chart: ^0.68.0
  intl: ^0.19.0
  flutter_secure_storage: ^9.2.2
  google_sign_in: ^6.2.1
  in_app_purchase: ^3.2.1
  url_launcher: ^6.2.5
  local_auth: ^2.3.0
  syncfusion_flutter_pdfviewer: ^28.2.7
  google_mobile_ads: ^5.3.0
  syncfusion_flutter_xlsio: ^28.2.7
  share_plus: ^10.1.4
  cached_network_image: ^3.4.1  # PERF-10: cache de imagens de rede

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.4.4         # MISC-02: mocking para testes
  build_runner: ^2.4.9    # MISC-02: code generation para mockito
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/

# ─── flutter_launcher_icons ───────────────────────────────────────────────────
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/icone.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/icone.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

# ─── flutter_native_splash ────────────────────────────────────────────────────
flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#FFFFFF"
  android: true
  ios: true
  android_12:
    color: "#FFFFFF"
    color_dark: "#FFFFFF"
  fullscreen: false
